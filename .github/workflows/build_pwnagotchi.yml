name: Build Pwnagotchi Firmware

on:
  push:
    branches: [master, "claude/**"]
    paths:
      - "pwnagotchi_sketch/**"
      - ".github/workflows/build_pwnagotchi.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure arduino-cli
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install ESP32 board support
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.0.7

      - name: Install required libraries
        run: |
          arduino-cli lib install "Adafruit SSD1306@2.5.9"
          arduino-cli lib install "Adafruit GFX Library@1.11.9"
          arduino-cli lib install "Adafruit BusIO@1.16.1"

      - name: Compile firmware (XIAO ESP32-S3)
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:XIAO_ESP32S3 \
            --output-dir build/ \
            --warnings default \
            pwnagotchi_sketch/

      - name: List build outputs
        run: ls -lh build/

      - name: Create merged flashable binary
        run: |
          pip install esptool --quiet
          ESP32_TOOLS="$HOME/.arduino15/packages/esp32/hardware/esp32/3.0.7/tools"
          BOOT_APP0="$ESP32_TOOLS/partitions/boot_app0.bin"

          esptool.py --chip esp32s3 merge_bin \
            --output build/pwnagotchi_merged.bin \
            --flash_mode dio \
            --flash_freq 80m \
            --flash_size 4MB \
            0x0000 build/pwnagotchi_sketch.ino.bootloader.bin \
            0x8000 build/pwnagotchi_sketch.ino.partitions.bin \
            0xe000 "$BOOT_APP0" \
            0x10000 build/pwnagotchi_sketch.ino.bin

          echo "Merged binary size: $(stat -c%s build/pwnagotchi_merged.bin) bytes"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwnagotchi-firmware-${{ github.sha }}
          path: |
            build/pwnagotchi_merged.bin
            build/pwnagotchi_sketch.ino.bin
            build/pwnagotchi_sketch.ino.bootloader.bin
            build/pwnagotchi_sketch.ino.partitions.bin
          retention-days: 90

      - name: Print flash instructions
        run: |
          echo ""
          echo "=== Flash Instructions ==="
          echo ""
          echo "Option A – Single merged binary (easiest):"
          echo "  esptool.py --chip esp32s3 --port /dev/ttyUSB0 write_flash 0x0 pwnagotchi_merged.bin"
          echo ""
          echo "Option B – Individual files:"
          echo "  esptool.py --chip esp32s3 --port /dev/ttyUSB0 write_flash \\"
          echo "    0x0000 pwnagotchi_sketch.ino.bootloader.bin \\"
          echo "    0x8000 pwnagotchi_sketch.ino.partitions.bin \\"
          echo "    0xe000 boot_app0.bin \\"
          echo "    0x10000 pwnagotchi_sketch.ino.bin"
          echo ""
          echo "Replace /dev/ttyUSB0 with your serial port (Windows: COMx, macOS: /dev/cu.usbmodem*)"
